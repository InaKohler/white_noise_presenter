<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Static</title>
<style>
  :root{
    --bg: #0b0d0f;
    --bg-2: #14171a;
    --text: #e9e6dd;
    --dim: #7c8288;
    --amber: #ffb454;
    --amber-dim: #7a5a2c;
    --line: #2a2e33;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    height:100%;
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', ui-monospace, SFMono-Regular, Menlo, monospace;
    overflow:hidden;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }

  .stage{
    height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 24px;
    gap: 36px;
  }

  .label{
    font-size: 12px;
    letter-spacing: 0.35em;
    color: var(--dim);
    text-transform: uppercase;
  }

  .btn{
    -webkit-appearance:none;
    appearance:none;
    border:none;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 28%, #23272b, #0f1113 70%);
    border: 1px solid var(--line);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.4),
      0 18px 30px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.04);
    color: var(--amber);
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.08s ease;
  }

  .btn:active,
  .btn.playing{
    transform: scale(0.96);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.4),
      0 8px 16px rgba(0,0,0,0.4),
      0 0 24px rgba(255,180,84,0.25),
      inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .hint{
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.05em;
    max-width: 260px;
    text-align:center;
    line-height:1.5;
  }

  .wake-warning{
    position:absolute;
    bottom: 14px;
    font-size: 10px;
    color: var(--dim);
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="label">white noise</div>

  <button class="btn" id="btn">Press</button>

  <div class="hint">Tap once for 2 seconds of static.<br>Loudness is randomized each press.</div>
</div>

<script>
(() => {
  const btn = document.getElementById('btn');

  let audioCtx = null;
  let noiseNode = null;
  let gainNode = null;
  let playing = false;
  let stopTimeoutId = null;

  const PLAY_DURATION_MS = 2000;

  function ensureContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function makeNoiseBuffer() {
    const bufferSize = audioCtx.sampleRate * 2; // 2 seconds, loops if needed
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    return buffer;
  }

  function randomGain() {
    // random loudness between ~8% and 100%, weighted so it's not always extreme
    const r = Math.random();
    return 0.08 + Math.pow(r, 1.3) * 0.92;
  }

  function startNoise() {
    ensureContext();
    if (playing) return;
    playing = true;

    const g = randomGain();

    noiseNode = audioCtx.createBufferSource();
    noiseNode.buffer = makeNoiseBuffer();
    noiseNode.loop = true;

    gainNode = audioCtx.createGain();
    gainNode.gain.value = g;

    noiseNode.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    noiseNode.start();

    btn.classList.add('playing');
    btn.textContent = 'Playing';
    btn.disabled = true;

    stopTimeoutId = setTimeout(stopNoise, PLAY_DURATION_MS);
  }

  function stopNoise() {
    if (!playing) return;
    playing = false;

    if (stopTimeoutId) {
      clearTimeout(stopTimeoutId);
      stopTimeoutId = null;
    }

    if (noiseNode) {
      try { noiseNode.stop(); } catch (e) {}
      noiseNode.disconnect();
    }
    if (gainNode) gainNode.disconnect();

    noiseNode = null;
    gainNode = null;

    btn.classList.remove('playing');
    btn.textContent = 'Press';
    btn.disabled = false;
  }

  btn.addEventListener('click', startNoise);

  // Safety: stop if tab loses focus mid-playback
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) stopNoise();
  });
})();
</script>

</body>
</html>
