<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Static</title>
<style>
  :root{
    --bg: #0b0d0f;
    --bg-2: #14171a;
    --text: #e9e6dd;
    --dim: #7c8288;
    --amber: #ffb454;
    --amber-dim: #7a5a2c;
    --line: #2a2e33;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    height:100%;
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Courier New', ui-monospace, SFMono-Regular, Menlo, monospace;
    overflow:hidden;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }

  .stage{
    height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 24px;
    gap: 36px;
  }

  .label{
    font-size: 12px;
    letter-spacing: 0.35em;
    color: var(--dim);
    text-transform: uppercase;
  }

  .readout{
    display:flex;
    align-items:baseline;
    gap: 10px;
    font-variant-numeric: tabular-nums;
  }

  .readout .db{
    font-size: 52px;
    color: var(--amber);
    min-width: 3.2ch;
    text-align:right;
    letter-spacing: -1px;
    transition: color 0.15s ease;
  }

  .readout .unit{
    font-size: 16px;
    color: var(--dim);
  }

  canvas{
    display:block;
    width: min(88vw, 420px);
    height: 90px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 4px;
  }

  .btn{
    -webkit-appearance:none;
    appearance:none;
    border:none;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 28%, #23272b, #0f1113 70%);
    border: 1px solid var(--line);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.4),
      0 18px 30px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.04);
    color: var(--amber);
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.08s ease;
  }

  .btn:active,
  .btn.playing{
    transform: scale(0.96);
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.4),
      0 8px 16px rgba(0,0,0,0.4),
      0 0 24px rgba(255,180,84,0.25),
      inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .hint{
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.05em;
    max-width: 260px;
    text-align:center;
    line-height:1.5;
  }

  .wake-warning{
    position:absolute;
    bottom: 14px;
    font-size: 10px;
    color: var(--dim);
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="label">white noise</div>

  <div class="readout">
    <span class="db" id="db">—</span>
    <span class="unit">gain</span>
  </div>

  <canvas id="scope" width="420" height="90"></canvas>

  <button class="btn" id="btn">Hold</button>

  <div class="hint">Press and hold for static.<br>Loudness is randomized each press.</div>
</div>

<script>
(() => {
  const btn = document.getElementById('btn');
  const dbEl = document.getElementById('db');
  const canvas = document.getElementById('scope');
  const ctx = canvas.getContext('2d');

  let audioCtx = null;
  let noiseNode = null;
  let gainNode = null;
  let analyser = null;
  let rafId = null;
  let playing = false;

  function ensureContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  }

  function makeNoiseBuffer() {
    const bufferSize = audioCtx.sampleRate * 2; // 2 seconds, loops
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    return buffer;
  }

  function randomGain() {
    // random loudness between ~8% and 100%, weighted so it's not always extreme
    const r = Math.random();
    return 0.08 + Math.pow(r, 1.3) * 0.92;
  }

  function startNoise() {
    ensureContext();
    if (playing) return;
    playing = true;

    const g = randomGain();

    noiseNode = audioCtx.createBufferSource();
    noiseNode.buffer = makeNoiseBuffer();
    noiseNode.loop = true;

    gainNode = audioCtx.createGain();
    gainNode.gain.value = g;

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;

    noiseNode.connect(gainNode);
    gainNode.connect(analyser);
    analyser.connect(audioCtx.destination);

    noiseNode.start();

    btn.classList.add('playing');
    btn.textContent = 'Playing';
    dbEl.textContent = Math.round(g * 100) + '%';
    dbEl.style.color = 'var(--amber)';

    drawScope();
  }

  function stopNoise() {
    if (!playing) return;
    playing = false;

    if (noiseNode) {
      try { noiseNode.stop(); } catch (e) {}
      noiseNode.disconnect();
    }
    if (gainNode) gainNode.disconnect();
    if (analyser) analyser.disconnect();

    noiseNode = null;
    gainNode = null;
    analyser = null;

    btn.classList.remove('playing');
    btn.textContent = 'Hold';

    if (rafId) cancelAnimationFrame(rafId);
    clearScope();
  }

  function drawScope() {
    if (!analyser) return;
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);

    function frame() {
      if (!playing || !analyser) return;
      analyser.getByteTimeDomainData(dataArray);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.beginPath();
      ctx.strokeStyle = '#ffb454';
      ctx.lineWidth = 1.5;

      const sliceWidth = canvas.width / bufferLength;
      let x = 0;
      for (let i = 0; i < bufferLength; i++) {
        const v = dataArray[i] / 128.0;
        const y = (v * canvas.height) / 2;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
        x += sliceWidth;
      }
      ctx.stroke();

      rafId = requestAnimationFrame(frame);
    }
    frame();
  }

  function clearScope() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.beginPath();
    ctx.strokeStyle = '#2a2e33';
    ctx.lineWidth = 1;
    ctx.moveTo(0, canvas.height / 2);
    ctx.lineTo(canvas.width, canvas.height / 2);
    ctx.stroke();
    dbEl.textContent = '—';
    dbEl.style.color = 'var(--text)';
  }

  clearScope();

  // Pointer events cover mouse, touch, and pen uniformly
  btn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    startNoise();
  });
  ['pointerup', 'pointerleave', 'pointercancel'].forEach(evt => {
    btn.addEventListener(evt, stopNoise);
  });

  // Safety: stop if tab loses focus while held
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) stopNoise();
  });
})();
</script>

</body>
</html>
